name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - run: pnpm install

      - run: pnpm tauri build

      - name: Upload Windows assets
        run: |
          for file in src-tauri/target/release/bundle/**/*.msi src-tauri/target/release/bundle/**/*.exe; do
            gh release upload ${{ github.ref_name }} "$file"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - run: pnpm install

      - run: pnpm tauri build

      - name: Upload macOS assets
        run: |
          for file in src-tauri/target/release/bundle/**/*.dmg src-tauri/target/release/bundle/**/*.app; do
            gh release upload ${{ github.ref_name }} "$file"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs:
      - build-windows
      - build-macos
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Delete release on failure
        run: |
          gh release delete ${{ github.ref_name }} --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
